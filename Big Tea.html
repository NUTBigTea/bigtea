<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Big Tea</title>
  <style>
    #whosucks {
      color: red;
    }
    #page-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      margin: 0;
      padding: 0.8rem 1rem;
      background: #101820;
      color: #f5f5f5;
      text-align: left;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      z-index: 1000;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #101820;
      color: #f5f5f5;
      text-align: center;
      padding: 5rem 2rem 2rem; /* leave room for fixed header */
    }
  </style>
</head>
<body>
  <div>
    <h1 id="page-header">Piza</h1>
    <p>You are a famous Austrian painter baking pizzas</p>
    <p id="pizza-count">Pizzas: 0</p>
    <p id="pizzasPerSecond">Pizzas per second: 0</p>
  </div>
  <button id="pizza" onclick="pizza()"> Pizza </button>
  <script>
    let seconds = 0;
    const clickTimestamps = [];
    let pizzaClicks = 0;

    function getRecentPizzasPerSecond() {
      const now = Date.now();
      const oneSecondAgo = now - 1000;
      // remove timestamps older than 1 second
      while (clickTimestamps.length && clickTimestamps[0] < oneSecondAgo) {
        clickTimestamps.shift();
      }
      return clickTimestamps.length / 1;
    }

    const timerInterval = setInterval(() => {
      seconds++;
      const pizzasPerSecond = getRecentPizzasPerSecond();
      document.getElementById("pizzasPerSecond").innerText = "Pizzas per second: " + pizzasPerSecond.toFixed(2);
    }, 1000);

    function pizza(){
      pizzaClicks += 1;
      clickTimestamps.push(Date.now());
      document.getElementById("pizza-count").innerText = "Pizzas: " + pizzaClicks;
      const pizzasPerSecond = getRecentPizzasPerSecond();
      document.getElementById("pizzasPerSecond").innerText = "Pizzas per second: " + pizzasPerSecond.toFixed(2);
    }
  </script>
</body>
</html>
