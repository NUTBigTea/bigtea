<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Peggle - Fully Playable</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #f0f0f0; display: flex; flex-direction: column; align-items: center; }
    #gameWrap { position: relative; margin-top: 10px; }
    #game { border: 4px solid #6ea8ff; background: radial-gradient(circle at 40% 20%, #4a5c95, #0c1338); display: block; }
    #hud { width: 800px; display: flex; justify-content: space-between; margin-top: 10px; }
    #message { min-height: 1.2rem; }
    button { background: #3c5ab4; color: white; border: none; border-radius: 5px; padding: 8px 14px; cursor: pointer; }
    button:hover { background: #5878d4; }
    #tip { font-size: 0.86rem; color: #ccc; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Peggle</h1>
  <div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Lives: <span id="lives">5</span></div>
    <div>Level: <span id="level">1</span></div>
    <button id="restartBtn">Restart</button>
  </div>
  <div id="gameWrap">
    <canvas id="game" width="800" height="600"></canvas>
  </div>
  <div id="message">Click and drag from the green ball to aim, release to shoot.</div>
  <div id="tip">Clear all orange pegs to win a level. Blue = bouncy, green = extra score.</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const levelEl = document.getElementById('level');
    const messageEl = document.getElementById('message');
    const restartBtn = document.getElementById('restartBtn');

    const W = canvas.width;
    const H = canvas.height;
    const startX = W / 2;
    const startY = H - 45;

    let score = 0;
    let lives = 5;
    let level = 1;
    let pegs = [];
    let shootMode = false;
    let aiming = false;
    let aimStart = null;
    let ball = createBall(startX, startY);
    let activeShot = false;

    function createBall(x, y) {
      return { x, y, r: 10, vx: 0, vy: 0, launched: false };
    }

    function createPegs(level) {
      const rows = 8;
      const cols = 14;
      const radius = 10;
      const gap = 18;
      const startx = 50;
      const starty = 80;
      const rowOffset = (W - 2*startx - cols*2*radius - (cols-1)*gap) / 2;
      let col = 0;
      let row = 0;
      let list = [];

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          let px = startx + rowOffset + c * (2*radius + gap) + radius;
          let py = starty + r * (2*radius + gap);
          let type = 'orange';
          if (r === 1 && c % 5 === 2) type = 'blue';
          if (r === 3 && c % 7 === 0) type = 'green';
          if (r === 6 && c % 4 === 0) type = 'blue';
          list.push({ x: px, y: py, r: radius, active: true, type });
        }
      }
      // one special red peg in the toughest level
      if (level > 2) {
        const red = { x: W/2, y: starty + rows * (2*radius + gap), r: 14, active: true, type: 'red' };
        list.push(red);
      }

      return list;
    }

    function drawScene() {
      ctx.clearRect(0, 0, W, H);
      // draws background
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.fillRect(0, 0, W, H);

      // Draw target pegs
      pegs.forEach(peg => {
        if (!peg.active) return;
        let color = '#f2a541';
        if (peg.type === 'blue') color = '#60b0ff';
        if (peg.type === 'green') color = '#70e070';
        if (peg.type === 'red') color = '#ff5a5a';
        ctx.beginPath();
        ctx.arc(peg.x, peg.y, peg.r, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = '#ffffff55';
        ctx.stroke();
      });

      // Draw shooter ball
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
      ctx.fillStyle = '#8cff8c';
      ctx.shadowColor = '#afff9f';
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#333';
      ctx.stroke();

      // Draw aiming line
      if (aiming && !ball.launched) {
        ctx.beginPath();
        ctx.moveTo(ball.x, ball.y);
        ctx.lineTo(aimStart.x, aimStart.y);
        ctx.strokeStyle = '#ffffffaa';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // Draw bottom line
      ctx.fillStyle = '#222';
      ctx.fillRect(0, H - 20, W, 20);
      ctx.fillStyle = '#fff';
      ctx.font = '14px Arial';
      ctx.fillText('Bottom drain: lose life on fall', 12, H - 5);

      // Draw life gauge
      if (!activeShot) {
        ctx.fillStyle = '#fff';
        ctx.font = '13px Arial';
        ctx.fillText('Click and drag to aim and release', 560, H-5);
      }
    }

    function updatePhysics(delta) {
      if (!ball.launched) return;

      ball.vy += 0.18 * delta;
      ball.x += ball.vx * delta;
      ball.y += ball.vy * delta;

      // walls and ceiling
      if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx) * 0.94; }
      if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx) * 0.94; }
      if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy) * 0.94; }

      // bottom drain
      if (ball.y - ball.r > H - 20) {
        lives -= 1;
        livesEl.textContent = lives;
        ball = createBall(startX, startY);
        activeShot = false;
        ball.launched = false;
        if (lives <= 0) {
          endGame(false);
        }
        return;
      }

      // peg collisions
      pegs.forEach(peg => {
        if (!peg.active) return;
        let dx = ball.x - peg.x;
        let dy = ball.y - peg.y;
        let dist = Math.hypot(dx, dy);
        let minDist = ball.r + peg.r;
        if (dist < minDist) {
          peg.active = false;
          let normalX = dx / dist;
          let normalY = dy / dist;
          let dot = ball.vx * normalX + ball.vy * normalY;
          ball.vx -= 2 * dot * normalX;
          ball.vy -= 2 * dot * normalY;
          ball.vx *= 0.98;
          ball.vy *= 0.98;
          // nudge outside
          ball.x = peg.x + normalX * minDist;
          ball.y = peg.y + normalY * minDist;

          if (peg.type === 'orange') score += 10;
          if (peg.type === 'blue') score += 12;
          if (peg.type === 'green') score += 20;
          if (peg.type === 'red') score += 50;
          if (peg.type === 'blue') { ball.vx *= 1.10; ball.vy *= 1.10; }
          if (peg.type === 'green') { lives = Math.min(7, lives + 1); livesEl.textContent = lives; }

          scoreEl.textContent = score;

          let remaining = pegs.filter(p => p.active && p.type === 'orange').length;
          if (remaining === 0) {
            nextLevel();
          }
        }
      });

      // slow the ball
      ball.vx *= 0.999;
      ball.vy *= 0.999;

      // stop when slow
      if (Math.hypot(ball.vx, ball.vy) < 0.03) {
        ball.launched = false;
        activeShot = false;
      }
    }

    function nextLevel() {
      level += 1;
      levelEl.textContent = level;
      messageEl.textContent = 'Level cleared! Keep shooting!';
      pegs = createPegs(level);
      ball = createBall(startX, startY);
      activeShot = false;
      ball.launched = false;
      if (level > 5) {
        endGame(true);
      }
    }

    function endGame(win) {
      ball = createBall(startX, startY);
      activeShot = false;
      ball.launched = false;
      messageEl.textContent = win ? 'Congratulations! You won Peggle!' : 'Game Over. Press Restart to try again.';
      if (win) {
        score += 500;
        scoreEl.textContent = score;
      }
    }

    function loop(timestamp) {
      if (!loop.last) loop.last = timestamp;
      let delta = (timestamp - loop.last) / 16.7;
      loop.last = timestamp;

      updatePhysics(delta);
      drawScene();
      requestAnimationFrame(loop);
    }

    canvas.addEventListener('mousedown', e => {
      if (activeShot) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const dist = Math.hypot(mx - ball.x, my - ball.y);
      if (dist <= ball.r + 12) {
        aiming = true;
        aimStart = { x: mx, y: my };
      }
    });

    canvas.addEventListener('mousemove', e => {
      if (!aiming) return;
      const rect = canvas.getBoundingClientRect();
      aimStart.x = e.clientX - rect.left;
      aimStart.y = e.clientY - rect.top;
    });

    canvas.addEventListener('mouseup', e => {
      if (!aiming) return;
      aiming = false;
      const rect = canvas.getBoundingClientRect();
      const releaseX = e.clientX - rect.left;
      const releaseY = e.clientY - rect.top;
      const dx = ball.x - releaseX;
      const dy = ball.y - releaseY;
      const strength = Math.min(Math.hypot(dx, dy), 220);
      if (strength > 10) {
        ball.vx = dx / 8;
        ball.vy = dy / 8;
        ball.launched = true;
        activeShot = true;
        messageEl.textContent = 'Ball launched!';
      }
    });

    restartBtn.addEventListener('click', () => {
      score = 0; lives = 5; level = 1;
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      levelEl.textContent = level;
      pegs = createPegs(level);
      ball = createBall(startX, startY);
      activeShot = false;
      ball.launched = false;
      messageEl.textContent = 'Click and drag from the green ball to aim, release to shoot.';
    });

    pegs = createPegs(level);
    requestAnimationFrame(loop);
  </script>
</body>
</html>
